<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工具 - Medivh Yang 的博客</title>
</head>

<body>
    <div id="tools-timestamp-convert" class="tools-item">
        <h2 class="tools-title">时间戳转换</h2>
        时间戳：<input type="number" id="tools-timestamp-convert-input" />
        <input type="button" value="转换" id="tools-timestamp-convert-ok" />
        <input type="text" id="tools-timestamp-convert-output" readonly />
    </div>

    <script>
        function initToolsTimestampConvert() {
            function convertTimestamp() {
                const inputEl = document.getElementById("tools-timestamp-convert-input")
                const outputEl = document.getElementById("tools-timestamp-convert-output")
                outputEl.value = formatTime(new Date(parseInt(inputEl.value)), 'yy-MM-dd hh:mm:ss')
            }

            function formatTime(t, fmt) {
                console.log("tools timestampe convert:", t, fmt)
                var o = {
                    "M+": t.getMonth() + 1, // 月份
                    "d+": t.getDate(), // 日
                    "h+": t.getHours(), // 小时
                    "m+": t.getMinutes(), // 分
                    "s+": t.getSeconds(), // 秒
                    "q+": Math.floor((t.getMonth() + 3) / 3), // 季度
                    "S": t.getMilliseconds() // 毫秒
                };
                if (/(y+)/.test(fmt))
                    fmt = fmt.replace(RegExp.$1, (t.getFullYear() + ""));
                for (var k in o)
                    if (new RegExp("(" + k + ")").test(fmt)) fmt = fmt.replace(RegExp.$1, (RegExp.$1.length == 1) ?
                        (o[k]) :
                        (("00" + o[k]).substr(("" + o[k]).length)));
                return fmt;
            }

            document.getElementById("tools-timestamp-convert-ok").addEventListener("click", function (v) {
                convertTimestamp()
            }, true)
        }

        window.onload = function () {
            initToolsTimestampConvert()
        }
    </script>
</body>

</html>
